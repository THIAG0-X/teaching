<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>todolist</title>
</head>
<body>
    <div class="container">
        <section class="login_section">
            <h1 class="login_title">Faça seu login</h1>
            <form class="login_form">
                
                <div class="login_campo">
                    <label for="iemail">E-mail:</label>
                    
                    <input type="email" name="email" id="iemail" placeholder="Insira seu email" autocomplete="email" required>
                </div>

                <div class="login_campo">
                    <label for="isenha">Senha:</label>

                    <input type="password" name="senha" id="isenha" placeholder="Insira sua senha" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login_btn">Entrar</button>
                <a href="#">Não tem login? Cadastra-se!</a>
            </form>
        </section>
    </div>
</body>
</html>
