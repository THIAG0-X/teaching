<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="tarefas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>todolist</title>
</head>
<body>
    <div class="container">
        <section class="todolist_section">
            <div class="header_bar">
                <div class="user_profile">
                    <div class="user_avatar" id="user_avatar"></div>
                    <span id="user_name"></span>
                </div>
                <button onclick="logout()" class="logout_btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
            <h1>Lista de tarefas</h1>
            <form class="task_form">

                <input
                    type="text"
                    name="title"
                    id="ititle"
                    placeholder="Nome da tarefa"
                />
                <input
                    type="text"
                    name="description"
                    id="idescription"
                    placeholder="descrição"
                />
                <input
                    type="date"
                    name="date"
                    id="idate"
                />
                <button type="button" class="add_btn" id="add_btn">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>
            <div class="task_list"></div>
        </section>
    </div>
    <script src="./tarefas.js"></script>
</body>
</html>
